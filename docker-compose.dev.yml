services:
  june1815-dev:
    image: node:22-slim
    working_dir: /app
    tty: true
    stdin_open: true
    ports:
      - "${JUNE1815_PORT:-7150}:7150"
    environment:
      NODE_ENV: development
      JUNE1815_HOST: 0.0.0.0
      JUNE1815_PORT: 7150
      JUNE1815_MODE: headless
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    volumes:
      - .:/app
      - june1815-dev-node-modules:/app/node_modules
      - june1815-dev-data:/var/lib/june1815
    command: >
      bash -c "npm install &&
               npm install -g @anthropic-ai/claude-code &&
               npm run dev"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7150/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  june1815-dev-node-modules:
  june1815-dev-data:
