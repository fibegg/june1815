name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test with coverage
        run: npm run test:coverage
      - name: Build
        run: npm run build
      - name: Upload coverage to Codecov
        if: ${{ matrix.node == '22' }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
      - name: Upload coverage artifact
        if: ${{ matrix.node == '22' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn

  alloy:
    name: Alloy model checks
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup OpenJDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Cache Alloy jar
        id: cache-alloy
        uses: actions/cache@v4
        with:
          path: ~/.local/share/june1815/alloy.jar
          key: alloy-6.2.0
      - name: Download Alloy
        if: steps.cache-alloy.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/june1815
          curl -sSL -o ~/.local/share/june1815/alloy.jar \
            https://github.com/AlloyTools/org.alloytools.alloy/releases/download/v6.2.0/org.alloytools.alloy.dist.jar
      - name: Run Alloy specs
        run: scripts/run-alloy.sh
