services:
  june1815:
    image: ghcr.io/fibegg/june1815:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${JUNE1815_PORT:-7150}:7150"
    environment:
      JUNE1815_HOST: 0.0.0.0
      JUNE1815_PORT: 7150
      JUNE1815_MODE: headless
      JUNE1815_BEARER_TOKEN: ${JUNE1815_BEARER_TOKEN:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - june1815-data:/var/lib/june1815
      - ./playground:/home/june1815/playground
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7150/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  june1815-data:
